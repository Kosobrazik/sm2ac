<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wall Crawler</title>
  <style>
    @font-face {
      font-family: "Homoarakhn";
      src: url("./assets/fonts/homoarakhn.regular.ttf") format("truetype");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --hud-number-font: "Small Fonts", "MS Sans Serif", Tahoma, "Arial Black", sans-serif;
      --hud-text-font: Tahoma, Arial, "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 12px;
      box-sizing: border-box;
      background:
        radial-gradient(circle at 50% 0%, rgba(18, 40, 78, 0.94), rgba(18, 40, 78, 0) 42%),
        linear-gradient(180deg, #08111d 0%, #04070d 62%, #020409 100%);
      font-family: "Homoarakhn", "Segoe UI", sans-serif;
    }

    .game-wrap {
      width: min(calc(100vw - 24px), 980px);
      aspect-ratio: 4 / 3;
      border: 2px solid #304562;
      border-radius: 10px;
      overflow: hidden;
      position: relative;
      background: #000;
      cursor: none;
      box-shadow:
        0 0 0 1px rgba(177, 199, 232, 0.12),
        0 18px 46px rgba(0, 0, 0, 0.55);
    }

    #root {
      position: absolute;
      inset: 0;
      transform-origin: top left;
      width: 640px;
      height: 480px;
      overflow: hidden;
    }

    .hidden {
      display: none !important;
    }

    .world-viewport {
      position: absolute;
      inset: 0;
      overflow: hidden;
      background: #000;
    }

    .world {
      position: absolute;
      left: 0;
      top: 0;
      width: 640px;
      height: 2400px;
      will-change: transform;
    }

    .world-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .background-image,
    .world-media,
    .pickup,
    .debris,
    .player,
    .cursor,
    .intro-image,
    .pause-bg,
    .pause-highlight,
    .confirm-bg,
    .confirm-highlight,
    .book-btn,
    #scoreLabelArt,
    #currentLabelArt,
    #missMeterBase,
    #missMeterFill,
    #missLabel,
    .life,
    .transition-video {
      position: absolute;
      image-rendering: pixelated;
      user-select: none;
      -webkit-user-drag: none;
    }

    .background-image {
      left: 0;
      top: 0;
      width: 640px;
      height: 2400px;
      object-fit: fill;
      pointer-events: none;
    }

    .world-media,
    .pickup,
    .debris,
    .player {
      pointer-events: none;
    }

    .world-media.video {
      background: transparent;
    }

    .pickup {
      z-index: 48;
      transform-origin: center center;
      animation: pickupFloat 1.2s ease-in-out infinite alternate;
    }

    .debris {
      z-index: 52;
      will-change: transform;
    }

    .player {
      z-index: 60;
      transform-origin: center center;
    }

    .cursor {
      width: 40px;
      height: 40px;
      transform: translate(-4px, -4px);
      pointer-events: none;
      z-index: 260;
      display: none;
    }

    .hud-label,
    .hud-value,
    .center-text,
    .level-indicator {
      position: absolute;
      z-index: 110;
      color: #fbfdff;
      font-family: var(--hud-text-font);
      font-weight: 700;
      line-height: 1;
      text-shadow:
        -2px 0 #000,
        2px 0 #000,
        0 -2px #000,
        0 2px #000,
        2px 2px 0 rgba(0, 0, 0, 0.35);
      pointer-events: none;
      text-transform: uppercase;
      -webkit-font-smoothing: none;
      text-rendering: optimizeSpeed;
    }

    .hud-label {
      font-size: 11px;
      letter-spacing: 1.2px;
    }

    .hud-value {
      font-family: var(--hud-number-font);
      font-size: 18px;
      letter-spacing: 1.3px;
      min-height: 17px;
    }

    .bitmap-score {
      position: absolute;
      z-index: 112;
      display: flex;
      align-items: flex-start;
      gap: 0;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    .bitmap-score-digit {
      display: block;
      flex: none;
      image-rendering: pixelated;
      user-select: none;
      -webkit-user-drag: none;
    }

    .bitmap-score-fallback-hidden {
      display: none !important;
    }

    #scoreLabelFallback {
      top: 11px;
      left: 50%;
      transform: translateX(-50%) scaleX(1.08);
      transform-origin: center top;
      min-width: 110px;
      text-align: center;
    }

    #scoreLabelArt {
      top: 11px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 112;
      pointer-events: none;
    }

    #bestScoreValue {
      top: 28px;
      left: 50%;
      min-width: 92px;
      text-align: center;
      transform: translateX(-50%) scaleX(1.14);
      transform-origin: center top;
    }

    #bestScoreBitmap {
      top: 28px;
      left: 50%;
      min-width: 92px;
      justify-content: center;
      transform: translateX(-50%);
    }

    #currentLabelFallback {
      top: 13px;
      right: 18px;
      transform: scaleX(1.04);
      transform-origin: right top;
      min-width: 78px;
      text-align: right;
      font-size: 10px;
    }

    #currentScoreValue {
      top: 28px;
      right: 18px;
      min-width: 52px;
      text-align: right;
      transform: scaleX(1.14);
      transform-origin: right top;
    }

    #currentScoreBitmap {
      top: 28px;
      right: 18px;
      min-width: 52px;
      justify-content: flex-end;
    }

    .life {
      width: 36px;
      height: 36px;
      z-index: 112;
      pointer-events: none;
    }

    .book-btn {
      left: 5px;
      top: 414px;
      z-index: 112;
      cursor: pointer;
    }

    #missMeterBase,
    #missMeterFill {
      left: 526px;
      top: 425px;
      z-index: 112;
    }

    #missLabel {
      left: 533px;
      top: 457px;
      z-index: 112;
    }

    .center-text {
      left: 0;
      right: 0;
      top: 98px;
      text-align: center;
      font-size: 18px;
      letter-spacing: 1.8px;
      z-index: 170;
    }

    .level-indicator {
      left: 114px;
      top: 13px;
      font-size: 10px;
      letter-spacing: 1.2px;
      z-index: 112;
    }

    .intro-overlay {
      position: absolute;
      inset: 0;
      z-index: 220;
      opacity: 1;
      transition: opacity 380ms ease, transform 380ms ease;
      background: #000;
    }

    .intro-overlay.fade-out {
      opacity: 0;
      transform: scale(1.02);
    }

    .intro-image {
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: fill;
      pointer-events: none;
    }

    .intro-arrow {
      position: absolute;
      left: 495px;
      top: 388px;
      cursor: pointer;
      pointer-events: auto;
      image-rendering: pixelated;
      user-select: none;
      -webkit-user-drag: none;
      transition: transform 120ms ease;
    }

    .intro-arrow:hover {
      transform: scale(1.03);
    }

    .transition-overlay {
      position: absolute;
      inset: 0;
      z-index: 205;
      background: rgba(0, 0, 0, 0.92);
    }

    .transition-video {
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: fill;
      image-rendering: auto;
    }

    .pause-layer,
    .confirm-layer {
      position: absolute;
      inset: 0;
      z-index: 210;
    }

    .pause-bg,
    .pause-highlight,
    .confirm-bg,
    .confirm-highlight {
      pointer-events: none;
    }

    .pause-hit,
    .confirm-hit {
      position: absolute;
      margin: 0;
      padding: 0;
      border: 0;
      background: transparent;
      cursor: pointer;
    }

    .pause-hit:focus-visible,
    .confirm-hit:focus-visible {
      outline: 1px solid rgba(255, 255, 255, 0.8);
      outline-offset: 1px;
    }

    @keyframes pickupFloat {
      from {
        transform: translateY(-2px) scale(0.98);
      }
      to {
        transform: translateY(2px) scale(1.03);
      }
    }
  </style>
</head>
<body>
  <div class="game-wrap" id="gameWrap">
    <div id="root">
      <div class="world-viewport" id="worldViewport">
        <div class="world" id="world">
          <img id="backgroundImage" class="background-image" src="" alt="Wall Crawler" />
          <div id="decorLayer" class="world-layer"></div>
          <div id="pickupLayer" class="world-layer"></div>
          <div id="debrisLayer" class="world-layer"></div>
          <img id="player" class="player hidden" src="" alt="Spider-Man" />
        </div>
      </div>

      <div id="scoreLabelFallback" class="hud-label">СЧЕТ</div>
      <img id="scoreLabelArt" src="./assets/art/ui/score_ru.png" alt="Счет" />
      <div id="bestScoreValue" class="hud-value">0</div>
      <div id="bestScoreBitmap" class="bitmap-score"></div>

      <div id="currentLabelFallback" class="hud-label">ТЕКУЩИЙ</div>
      <div id="currentScoreValue" class="hud-value">0</div>
      <div id="currentScoreBitmap" class="bitmap-score"></div>

      <div id="levelIndicator" class="level-indicator">УРОВЕНЬ 1</div>
      <div id="centerText" class="center-text hidden"></div>

      <div id="transitionOverlay" class="transition-overlay hidden">
        <video id="transitionVideo" class="transition-video" playsinline preload="auto"></video>
      </div>

      <div id="introOverlay" class="intro-overlay hidden" aria-live="polite">
        <img id="introImage" class="intro-image" src="./assets/art/ui/help/help1crawl.bmp" alt="Инструктаж" />
        <img id="introContinue" class="intro-arrow" src="./assets/art/ui/help/playover.bmp" alt="Продолжить" />
      </div>

      <div id="pauseMenuOverlay" class="pause-layer hidden" aria-live="polite">
        <img class="pause-bg" src="./assets/art/ui/menu.bmp" alt="Меню паузы" style="left: 188px; top: 70px;" />

        <img id="pauseResumeOverlay" class="pause-highlight hidden" src="./assets/art/ui/resumeover.bmp" alt="" style="left: 213px; top: 111px;" />
        <button id="pauseResumeHit" class="pause-hit" type="button" aria-label="Продолжить" style="left: 213px; top: 111px; width: 210px; height: 59px;"></button>

        <img id="pauseRestartOverlay" class="pause-highlight hidden" src="./assets/art/ui/restartover.bmp" alt="" style="left: 200px; top: 173px;" />
        <button id="pauseRestartHit" class="pause-hit" type="button" aria-label="Заново" style="left: 200px; top: 173px; width: 239px; height: 61px;"></button>

        <img id="pauseHelpOverlay" class="pause-highlight hidden" src="./assets/art/ui/helpover.bmp" alt="" style="left: 232px; top: 237px;" />
        <button id="pauseHelpHit" class="pause-hit" type="button" aria-label="Помощь" style="left: 232px; top: 237px; width: 159px; height: 61px;"></button>

        <img id="pauseMainMenuOverlay" class="pause-highlight hidden" src="./assets/art/ui/mainover.bmp" alt="" style="left: 195px; top: 301px;" />
        <button id="pauseMainMenuHit" class="pause-hit" type="button" aria-label="Главное меню" style="left: 195px; top: 301px; width: 249px; height: 60px;"></button>
      </div>

      <div id="pauseConfirmOverlay" class="confirm-layer hidden" aria-live="polite">
        <img class="confirm-bg" src="./assets/art/global/areyousure.bmp" alt="Вы уверены?" style="left: 181px; top: 170px;" />

        <img id="pauseConfirmYesOverlay" class="confirm-highlight hidden" src="./assets/art/global/yesover.bmp" alt="" style="left: 240px; top: 244px;" />
        <button id="pauseConfirmYesHit" class="confirm-hit" type="button" aria-label="Да" style="left: 240px; top: 244px; width: 83px; height: 35px;"></button>

        <img id="pauseConfirmNoOverlay" class="confirm-highlight hidden" src="./assets/art/global/noover.bmp" alt="" style="left: 322px; top: 243px;" />
        <button id="pauseConfirmNoHit" class="confirm-hit" type="button" aria-label="Нет" style="left: 322px; top: 243px; width: 58px; height: 35px;"></button>
      </div>
    </div>

    <img id="cursor" class="cursor" src="./assets/art/global/cursor/arrow2_trim.png" alt="cursor" />
  </div>

  <script type="module" src="./src/crawl.js"></script>
</body>
</html>
