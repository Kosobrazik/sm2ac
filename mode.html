<!doctype html>
<html lang="ru">
<head>
<link rel="icon" href="./icon.ico?v=3" type="image/x-icon">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Человек-Паук. Новая страница</title>
  <style>
    @font-face {
      font-family: "Homoarakhn";
      src: url("./assets/fonts/homoarakhn.regular.ttf") format("truetype");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #070b12;
      font-family: "Homoarakhn", "Segoe UI", sans-serif;
    }

    .game-wrap {
      width: min(100vw, 980px);
      aspect-ratio: 4 / 3;
      border: 2px solid #2f3c53;
      border-radius: 10px;
      overflow: hidden;
      position: relative;
      background: #000;
      cursor: none;
      box-shadow: 0 16px 42px rgba(0, 0, 0, 0.5);
    }

    #root {
      position: absolute;
      inset: 0;
      transform-origin: top left;
      width: 640px;
      height: 480px;
    }

    .mode-image,
    .intro-image,
    .pause-bg,
    .pause-highlight,
    .confirm-bg,
    .confirm-highlight,
    .cursor {
      position: absolute;
      image-rendering: pixelated;
      user-select: none;
      -webkit-user-drag: none;
    }

    .mode-image,
    .intro-image {
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: fill;
      pointer-events: none;
    }

    .hidden {
      display: none;
    }

    .cursor {
      width: 40px;
      height: 40px;
      transform: translate(-4px, -4px);
      pointer-events: none;
      z-index: 260;
      display: none;
    }

    .intro-overlay {
      position: absolute;
      inset: 0;
      z-index: 220;
      opacity: 1;
      transition: opacity 380ms ease, transform 380ms ease;
      background: #000;
    }

    .intro-overlay.hidden {
      display: none;
    }

    .intro-overlay.fade-out {
      opacity: 0;
      transform: scale(1.02);
    }

    .intro-arrow {
      position: absolute;
      left: 495px;
      top: 388px;
      cursor: pointer;
      pointer-events: auto;
      image-rendering: pixelated;
      user-select: none;
      -webkit-user-drag: none;
      transition: transform 120ms ease;
    }

    .intro-arrow:hover {
      transform: scale(1.03);
    }

    .pause-layer,
    .confirm-layer {
      position: absolute;
      inset: 0;
      z-index: 210;
    }

    .pause-bg,
    .pause-highlight,
    .confirm-bg,
    .confirm-highlight {
      pointer-events: none;
    }

    .pause-hit,
    .confirm-hit {
      position: absolute;
      margin: 0;
      padding: 0;
      border: 0;
      background: transparent;
      cursor: pointer;
    }

    .pause-hit:focus-visible,
    .confirm-hit:focus-visible {
      outline: 1px solid rgba(255, 255, 255, 0.8);
      outline-offset: 1px;
    }
  </style>
</head>
<body>
  <div class="game-wrap" id="gameWrap">
    <div id="root">
      <img id="modeBackground" class="mode-image" src="" alt="Р РµР¶РёРј" />

      <div id="introOverlay" class="intro-overlay hidden" aria-live="polite">
        <img id="introImage" class="intro-image" src="" alt="РРЅСЃС‚СЂСѓРєС‚Р°Р¶" />
        <img id="introContinue" class="intro-arrow" src="./assets/art/ui/help/playover.bmp" alt="РџСЂРѕРґРѕР»Р¶РёС‚СЊ" />
      </div>

      <div id="pauseMenuOverlay" class="pause-layer hidden" aria-live="polite">
        <img class="pause-bg" src="./assets/art/ui/menu.bmp" alt="РњРµРЅСЋ РїР°СѓР·С‹" style="left: 188px; top: 70px;" />

        <img id="pauseResumeOverlay" class="pause-highlight hidden" src="./assets/art/ui/resumeover.bmp" alt="" style="left: 213px; top: 111px;" />
        <button id="pauseResumeHit" class="pause-hit" type="button" aria-label="РџСЂРѕРґРѕР»Р¶РёС‚СЊ" style="left: 213px; top: 111px; width: 210px; height: 59px;"></button>

        <img id="pauseRestartOverlay" class="pause-highlight hidden" src="./assets/art/ui/restartover.bmp" alt="" style="left: 200px; top: 173px;" />
        <button id="pauseRestartHit" class="pause-hit" type="button" aria-label="Р—Р°РЅРѕРІРѕ" style="left: 200px; top: 173px; width: 239px; height: 61px;"></button>

        <img id="pauseHelpOverlay" class="pause-highlight hidden" src="./assets/art/ui/helpover.bmp" alt="" style="left: 232px; top: 237px;" />
        <button id="pauseHelpHit" class="pause-hit" type="button" aria-label="РџРѕРјРѕС‰СЊ" style="left: 232px; top: 237px; width: 159px; height: 61px;"></button>

        <img id="pauseMainMenuOverlay" class="pause-highlight hidden" src="./assets/art/ui/mainover.bmp" alt="" style="left: 195px; top: 301px;" />
        <button id="pauseMainMenuHit" class="pause-hit" type="button" aria-label="Р“Р»Р°РІРЅРѕРµ РјРµРЅСЋ" style="left: 195px; top: 301px; width: 249px; height: 60px;"></button>
      </div>

      <div id="pauseConfirmOverlay" class="confirm-layer hidden" aria-live="polite">
        <img class="confirm-bg" src="./assets/art/global/areyousure.png" alt="Р’С‹ СѓРІРµСЂРµРЅС‹?" style="left: 181px; top: 170px;" />

        <img id="pauseConfirmYesOverlay" class="confirm-highlight hidden" src="./assets/art/global/yesover.bmp" alt="" style="left: 240px; top: 244px;" />
        <button id="pauseConfirmYesHit" class="confirm-hit" type="button" aria-label="Р”Р°" style="left: 240px; top: 244px; width: 83px; height: 35px;"></button>

        <img id="pauseConfirmNoOverlay" class="confirm-highlight hidden" src="./assets/art/global/noover.bmp" alt="" style="left: 322px; top: 243px;" />
        <button id="pauseConfirmNoHit" class="confirm-hit" type="button" aria-label="РќРµС‚" style="left: 322px; top: 243px; width: 58px; height: 35px;"></button>
      </div>
    </div>

    <img id="cursor" class="cursor" src="./assets/art/global/cursor/arrow2_trim.png" alt="cursor" />
  </div>

  <script type="module" src="./src/mode-shell.js"></script>
</body>
</html>
