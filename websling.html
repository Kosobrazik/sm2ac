<!doctype html>
<html lang="ru">
<head>
  <link rel="icon" href="./icon.ico?v=3" type="image/x-icon">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Человек-Паук. Новая страница</title>
  <style>
    @font-face {
      font-family: "Homoarakhn";
      src: url("./assets/fonts/homoarakhn.regular.ttf") format("truetype");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --hud-number-font: "Small Fonts", "MS Sans Serif", Tahoma, "Arial Black", sans-serif;
      --hud-text-font: Tahoma, Arial, "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 12px;
      box-sizing: border-box;
      background:
        radial-gradient(circle at 50% 0%, rgba(18, 30, 54, 0.85), rgba(18, 30, 54, 0) 42%),
        linear-gradient(180deg, #070d17 0%, #03060b 100%);
      font-family: "Homoarakhn", "Segoe UI", sans-serif;
    }

    .game-wrap {
      width: min(calc(100vw - 24px), 980px);
      aspect-ratio: 4 / 3;
      border: 2px solid #32445f;
      border-radius: 10px;
      overflow: hidden;
      position: relative;
      background: #000;
      cursor: none;
      box-shadow:
        0 0 0 1px rgba(177, 199, 232, 0.12),
        0 18px 46px rgba(0, 0, 0, 0.55);
    }

    #root {
      position: absolute;
      inset: 0;
      transform-origin: top left;
      width: 640px;
      height: 480px;
      overflow: hidden;
    }

    .scene-layer,
    .hud-layer,
    .pause-layer,
    .confirm-layer,
    .result-overlay,
    .intro-overlay {
      position: absolute;
      inset: 0;
    }

    .scene-layer {
      z-index: 20;
      background: #000;
    }

    .hidden {
      display: none !important;
    }

    .background-image,
    .main-video,
    .stage-video,
    .intro-image,
    .pause-bg,
    .pause-highlight,
    .confirm-bg,
    .confirm-highlight,
    .cursor,
    .life,
    #scoreLabelArt {
      position: absolute;
      image-rendering: pixelated;
      user-select: none;
      -webkit-user-drag: none;
    }

    .background-image,
    .main-video,
    .stage-video,
    .intro-image {
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: fill;
      pointer-events: none;
    }

    .main-video,
    .stage-video {
      image-rendering: auto;
      background: transparent;
      z-index: 25;
    }

    .stage-video {
      z-index: 28;
      background: #000;
    }

    .decision-line {
      position: absolute;
      top: 0;
      width: 2px;
      height: 480px;
      background: transparent;
      box-shadow: none;
      opacity: 0;
      z-index: 40;
      pointer-events: none;
      transform: translateX(-1px);
    }

    .hud-layer {
      z-index: 70;
      pointer-events: none;
    }

    .hud-label,
    .hud-value,
    .round-label,
    .center-text {
      position: absolute;
      color: #fbfdff;
      font-family: var(--hud-text-font);
      font-weight: 700;
      line-height: 1;
      text-shadow:
        -2px 0 #000,
        2px 0 #000,
        0 -2px #000,
        0 2px #000,
        2px 2px 0 rgba(0, 0, 0, 0.35);
      text-transform: uppercase;
      -webkit-font-smoothing: none;
      text-rendering: optimizeSpeed;
    }

    .hud-label {
      font-size: 10px;
      letter-spacing: 1.2px;
    }

    .hud-value {
      font-family: var(--hud-number-font);
      font-size: 18px;
      letter-spacing: 1.3px;
      min-height: 17px;
    }

    #scoreLabelFallback {
      top: 11px;
      left: 50%;
      min-width: 110px;
      text-align: center;
      transform: translateX(-50%) scaleX(1.08);
      transform-origin: center top;
    }

    #scoreLabelArt {
      top: 11px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 72;
      pointer-events: none;
    }

    #bestScoreValue {
      top: 28px;
      left: 50%;
      min-width: 92px;
      text-align: center;
      transform: translateX(-50%) scaleX(1.14);
      transform-origin: center top;
    }

    #bestScoreBitmap {
      top: 28px;
      left: 50%;
      min-width: 92px;
      justify-content: center;
      transform: translateX(-50%);
    }

    #currentLabel {
      top: 13px;
      right: 18px;
      min-width: 84px;
      text-align: right;
      transform: scaleX(1.04);
      transform-origin: right top;
    }

    #currentScoreValue {
      top: 28px;
      right: 18px;
      min-width: 58px;
      text-align: right;
      transform: scaleX(1.14);
      transform-origin: right top;
    }

    #currentScoreBitmap {
      top: 28px;
      right: 18px;
      min-width: 58px;
      justify-content: flex-end;
    }

    .bitmap-score {
      position: absolute;
      z-index: 73;
      display: flex;
      align-items: flex-start;
      gap: 0;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    .bitmap-score-digit {
      display: block;
      flex: none;
      image-rendering: pixelated;
      user-select: none;
      -webkit-user-drag: none;
    }

    .bitmap-score-fallback-hidden {
      display: none !important;
    }

    .lives {
      position: absolute;
      left: 11px;
      top: 10px;
      display: flex;
      gap: 2px;
      z-index: 73;
    }

    .life {
      width: 30px;
      height: 30px;
      position: relative;
      filter: drop-shadow(0 2px 0 rgba(0, 0, 0, 0.45));
    }

    .life.is-empty {
      opacity: 0.2;
      filter: grayscale(1) brightness(0.66);
    }

    .round-label {
      left: 12px;
      top: 44px;
      font-size: 10px;
      letter-spacing: 1px;
      z-index: 74;
    }

    .center-text {
      left: 0;
      right: 0;
      top: 98px;
      text-align: center;
      font-size: 18px;
      letter-spacing: 1.8px;
      z-index: 80;
      pointer-events: none;
    }
    .stage-intro {
      position: absolute;
      left: 0;
      right: 0;
      top: 150px;
      z-index: 82;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      color: #fbfdff;
      font-family: var(--hud-text-font);
      font-weight: 700;
      text-transform: uppercase;
      text-shadow:
        -2px 0 #000,
        2px 0 #000,
        0 -2px #000,
        0 2px #000,
        2px 2px 0 rgba(0, 0, 0, 0.35);
      pointer-events: none;
      opacity: 0;
      -webkit-font-smoothing: none;
      text-rendering: optimizeSpeed;
    }

    .stage-intro-level {
      font-size: 16px;
      letter-spacing: 1.2px;
    }

    .stage-intro-round {
      font-size: 13px;
      letter-spacing: 1.1px;
    }

    .stage-intro.is-animating {
      animation: stage-intro-fade 3000ms ease forwards;
    }

    @keyframes stage-intro-fade {
      0% { opacity: 0; transform: translateY(4px); }
      18% { opacity: 1; transform: translateY(0); }
      72% { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(-3px); }
    }

    .intro-overlay {
      z-index: 220;
      opacity: 1;
      transition: opacity 380ms ease, transform 380ms ease;
      background: #000;
    }

    .intro-overlay.fade-out {
      opacity: 0;
      transform: scale(1.02);
    }

    .intro-arrow {
      position: absolute;
      left: 495px;
      top: 388px;
      cursor: pointer;
      pointer-events: auto;
      image-rendering: pixelated;
      user-select: none;
      -webkit-user-drag: none;
      transition: transform 120ms ease;
    }

    .intro-arrow:hover {
      transform: scale(1.03);
    }

    .pause-layer,
    .confirm-layer {
      z-index: 210;
    }

    .pause-bg,
    .pause-highlight,
    .confirm-bg,
    .confirm-highlight {
      pointer-events: none;
    }

    .pause-hit,
    .confirm-hit,
    .result-action {
      position: absolute;
      margin: 0;
      padding: 0;
      border: 0;
      background: transparent;
      cursor: pointer;
    }

    .pause-hit:focus-visible,
    .confirm-hit:focus-visible,
    .try-again-hit:focus-visible,
    .result-action:focus-visible {
      outline: 1px solid rgba(255, 255, 255, 0.8);
      outline-offset: 1px;
    }

    .try-again-layer {
      position: absolute;
      inset: 0;
      z-index: 230;
    }

    .try-again-bg,
    .try-again-highlight {
      position: absolute;
      image-rendering: pixelated;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }

    .try-again-hit {
      position: absolute;
      margin: 0;
      padding: 0;
      border: 0;
      background: transparent;
      cursor: pointer;
    }
    .result-overlay {
      z-index: 230;
      display: grid;
      place-items: center;
      background: rgba(0, 0, 0, 0.72);
      backdrop-filter: blur(4px);
    }

    .result-panel {
      width: min(88%, 360px);
      padding: 18px 18px 16px;
      border: 1px solid rgba(184, 210, 238, 0.42);
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(12, 23, 37, 0.96), rgba(5, 10, 17, 0.96));
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.54);
      text-align: center;
    }

    .result-title {
      margin: 0 0 8px;
      color: #f4f9ff;
      font-size: 20px;
      letter-spacing: 0.8px;
      text-shadow: -2px 0 #000, 2px 0 #000, 0 -2px #000, 0 2px #000;
    }

    .result-body {
      margin: 0 0 16px;
      color: #cad7e7;
      font-family: var(--hud-text-font);
      font-size: 13px;
      line-height: 1.45;
    }

    .result-actions {
      display: flex;
      justify-content: center;
      gap: 10px;
      position: relative;
    }

    .result-action {
      position: relative;
      min-width: 112px;
      padding: 8px 14px 9px;
      border: 1px solid rgba(173, 198, 227, 0.4);
      border-radius: 999px;
      background: rgba(19, 33, 52, 0.95);
      color: #f3f8ff;
      font-family: var(--hud-text-font);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      transition: transform 120ms ease, background 120ms ease;
    }

    .result-action:hover {
      transform: translateY(-1px);
      background: rgba(31, 52, 78, 0.98);
    }

    .book-btn {
      position: absolute;
      left: 5px;
      top: 414px;
      z-index: 205;
      cursor: pointer;
      pointer-events: auto;
      image-rendering: pixelated;
      user-select: none;
      -webkit-user-drag: none;
    }
    .cursor {
      width: 40px;
      height: 40px;
      transform: translate(-4px, -4px);
      pointer-events: none;
      z-index: 260;
      display: none;
    }

    /* Minimal HUD: keep only lives + current score in gameplay. */
    #scoreLabelFallback,
    #scoreLabelArt,
    #bestScoreValue,
    #bestScoreBitmap,
    #currentLabel,
    #roundLabel,
    #centerText {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="game-wrap" id="gameWrap">
    <div id="root">
      <div class="scene-layer" id="sceneLayer">
        <img id="backgroundImage" class="background-image" src="./assets/art/webslinger/background.png" alt="Web Slinger" />
        <video id="mainVideo" class="main-video" playsinline preload="auto"></video>
        <video id="stageVideo" class="stage-video hidden" playsinline preload="auto"></video>
        <div id="decisionLine" class="decision-line hidden"></div>
      </div>

      <div class="hud-layer" id="hudLayer">
        <div id="scoreLabelFallback" class="hud-label">РЎР§Р•Рў</div>
        <img id="scoreLabelArt" src="./assets/art/ui/score_ru.png" alt="РЎС‡РµС‚" />
        <div id="bestScoreValue" class="hud-value">0</div>
        <div id="bestScoreBitmap" class="bitmap-score"></div>

        <div id="currentLabel" class="hud-label">РўР•РљРЈР©РР™</div>
        <div id="currentScoreValue" class="hud-value">0</div>
        <div id="currentScoreBitmap" class="bitmap-score"></div>

        <div id="lives" class="lives" aria-label="Р–РёР·РЅРё"></div>
        <div id="roundLabel" class="round-label">РЈР РћР’Р•РќР¬ 1 вЂў Р РђРЈРќР” 1</div>
        <div id="centerText" class="center-text hidden"></div>
        <div id="stageIntroText" class="stage-intro hidden" aria-live="polite"></div>
      </div>

      <div id="introOverlay" class="intro-overlay hidden" aria-live="polite">
        <img id="introImage" class="intro-image" src="./assets/art/ui/help/help6WebSling.bmp" alt="РРЅСЃС‚СЂСѓРєС‚Р°Р¶" />
        <img id="introContinue" class="intro-arrow" src="./assets/art/ui/help/playover.bmp" alt="РџСЂРѕРґРѕР»Р¶РёС‚СЊ" />
      </div>

      <div id="pauseMenuOverlay" class="pause-layer hidden" aria-live="polite">
        <img class="pause-bg" src="./assets/art/ui/menu.bmp" alt="РњРµРЅСЋ РїР°СѓР·С‹" style="left: 188px; top: 70px;" />

        <img id="pauseResumeOverlay" class="pause-highlight hidden" src="./assets/art/ui/resumeover.bmp" alt="" style="left: 213px; top: 111px;" />
        <button id="pauseResumeHit" class="pause-hit" type="button" aria-label="РџСЂРѕРґРѕР»Р¶РёС‚СЊ" style="left: 213px; top: 111px; width: 210px; height: 59px;"></button>

        <img id="pauseRestartOverlay" class="pause-highlight hidden" src="./assets/art/ui/restartover.bmp" alt="" style="left: 200px; top: 173px;" />
        <button id="pauseRestartHit" class="pause-hit" type="button" aria-label="Р—Р°РЅРѕРІРѕ" style="left: 200px; top: 173px; width: 239px; height: 61px;"></button>

        <img id="pauseHelpOverlay" class="pause-highlight hidden" src="./assets/art/ui/helpover.bmp" alt="" style="left: 232px; top: 237px;" />
        <button id="pauseHelpHit" class="pause-hit" type="button" aria-label="РџРѕРјРѕС‰СЊ" style="left: 232px; top: 237px; width: 159px; height: 61px;"></button>

        <img id="pauseMainMenuOverlay" class="pause-highlight hidden" src="./assets/art/ui/mainover.bmp" alt="" style="left: 195px; top: 301px;" />
        <button id="pauseMainMenuHit" class="pause-hit" type="button" aria-label="Р“Р»Р°РІРЅРѕРµ РјРµРЅСЋ" style="left: 195px; top: 301px; width: 249px; height: 60px;"></button>
      </div>

      <div id="pauseConfirmOverlay" class="confirm-layer hidden" aria-live="polite">
        <img class="confirm-bg" src="./assets/art/global/areyousure.png" alt="Р’С‹ СѓРІРµСЂРµРЅС‹?" style="left: 181px; top: 170px;" />

        <img id="pauseConfirmYesOverlay" class="confirm-highlight hidden" src="./assets/art/global/yesover.bmp" alt="" style="left: 240px; top: 244px;" />
        <button id="pauseConfirmYesHit" class="confirm-hit" type="button" aria-label="Р”Р°" style="left: 240px; top: 244px; width: 83px; height: 35px;"></button>

        <img id="pauseConfirmNoOverlay" class="confirm-highlight hidden" src="./assets/art/global/noover.bmp" alt="" style="left: 322px; top: 243px;" />
        <button id="pauseConfirmNoHit" class="confirm-hit" type="button" aria-label="РќРµС‚" style="left: 322px; top: 243px; width: 58px; height: 35px;"></button>
      </div>

      <div id="tryAgainOverlay" class="try-again-layer hidden" aria-live="polite">
        <img class="try-again-bg" src="./assets/art/global/tryagain.bmp" alt="РџРѕРїСЂРѕР±РѕРІР°С‚СЊ РµС‰С‘ СЂР°Р·?" style="left: 181px; top: 170px;" />

        <img id="tryAgainYesOverlay" class="try-again-highlight hidden" src="./assets/art/global/yesover.bmp" alt="" style="left: 240px; top: 244px;" />
        <button id="tryAgainYesHit" class="try-again-hit" type="button" aria-label="Р”Р°" style="left: 240px; top: 244px; width: 83px; height: 35px;"></button>

        <img id="tryAgainNoOverlay" class="try-again-highlight hidden" src="./assets/art/global/noover.bmp" alt="" style="left: 322px; top: 243px;" />
        <button id="tryAgainNoHit" class="try-again-hit" type="button" aria-label="РќРµС‚" style="left: 322px; top: 243px; width: 58px; height: 35px;"></button>
      </div>
      <div id="resultOverlay" class="result-overlay hidden" aria-live="polite">
        <div class="result-panel">
          <h1 id="resultTitle" class="result-title">Web Slinger</h1>
          <p id="resultBody" class="result-body"></p>
          <div class="result-actions">
            <button id="resultRestart" class="result-action" type="button">Р—Р°РЅРѕРІРѕ</button>
            <button id="resultMenu" class="result-action" type="button">Р’ РјРµРЅСЋ</button>
          </div>
        </div>
      </div>
    </div>

    <img id="pauseBookBtn" class="book-btn" src="./assets/art/ui/book.png" alt="РџР°СѓР·Р°" />
    <img id="cursor" class="cursor" src="./assets/art/global/cursor/arrow2_trim.png" alt="cursor" />
  </div>

  <script type="module" src="./src/websling.js"></script>
</body>
</html>
