<!doctype html>
<html lang="ru">
<head>
  <link rel="icon" href="./icon.ico?v=3" type="image/x-icon">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Человек-Паук. Новая страница</title>
  <style>
    @font-face {
      font-family: "Homoarakhn";
      src: url("./assets/fonts/homoarakhn.regular.ttf") format("truetype");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --hud-text-font: Tahoma, Arial, "Segoe UI", sans-serif;
      --hud-number-font: "Small Fonts", "MS Sans Serif", Tahoma, "Arial Black", sans-serif;
      --panel-bg: rgba(4, 10, 17, 0.86);
      --panel-border: rgba(170, 198, 228, 0.42);
      --panel-shadow: 0 12px 32px rgba(0, 0, 0, 0.5);
      --pixel-shadow: -2px 0 #000, 2px 0 #000, 0 -2px #000, 0 2px #000;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top, rgba(43, 64, 92, 0.46), transparent 44%),
        linear-gradient(180deg, #09101a 0%, #05080f 100%);
      font-family: "Homoarakhn", "Segoe UI", sans-serif;
      color: #eef5ff;
      overflow: hidden;
    }

    .game-wrap {
      width: min(100vw, 980px);
      aspect-ratio: 4 / 3;
      border: 2px solid #32425b;
      border-radius: 10px;
      overflow: hidden;
      position: relative;
      background: #000;
      cursor: none;
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.6);
    }

    #root {
      position: absolute;
      inset: 0;
      width: 640px;
      height: 480px;
      transform-origin: top left;
      overflow: hidden;
    }

    .sprite,
    .cursor,
    .pause-bg,
    .pause-highlight,
    .confirm-bg,
    .confirm-highlight,
    .intro-image {
      position: absolute;
      image-rendering: pixelated;
      user-select: none;
      -webkit-user-drag: none;
    }

    .sprite { pointer-events: none; }
    .interactive { pointer-events: auto; cursor: pointer; }
    .hidden { display: none !important; }

    .lab-bg,
    .intro-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: fill;
      image-rendering: pixelated;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }
    .ambient-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 8;
      overflow: hidden;
    }

    .ambient-video {
      position: absolute;
      image-rendering: pixelated;
      pointer-events: none;
      mix-blend-mode: screen;
      opacity: 0.8;
    }
    .hud {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 70;
    }

    .score-title-art {
      position: absolute;
      left: 50%;
      top: 10px;
      transform: translateX(-50%);
      image-rendering: pixelated;
      pointer-events: none;
    }
    .hud-block {
      position: absolute;
      padding: 0;
      border: 0;
      background: transparent;
      box-shadow: none;
      backdrop-filter: none;
      pointer-events: none;
    }

    .hud-block.score { left: 50%; top: 12px; transform: translateX(-50%); text-align: center; width: 140px; }
    .hud-block.time { right: 16px; top: 18px; text-align: right; }
    .hud-block.round { left: 16px; top: 18px; }
    .hud-label { display: none; }

    .hud-value {
      color: #f7fbff;
      font-family: var(--hud-number-font);
      font-size: 21px;
      font-weight: 700;
      letter-spacing: 1px;
      line-height: 1;
      text-shadow: var(--pixel-shadow);
    }

    .hud-text {
      color: #f7fbff;
      font-family: var(--hud-text-font);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.6px;
      line-height: 1.2;
      text-shadow: var(--pixel-shadow);
    }

    .hud-block.score .hud-value,
    .hud-block.score .bitmap-score { margin-top: 18px; }

    .hud-block.time .hud-value,
    .hud-block.time .bitmap-score { justify-content: flex-end; }

    .bitmap-score {
      display: flex;
      align-items: flex-start;
      gap: 0;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
      justify-content: center;
      min-height: 18px;
    }

    .bitmap-score-digit {
      display: block;
      flex: none;
      image-rendering: pixelated;
      user-select: none;
      -webkit-user-drag: none;
    }

    .bitmap-score-fallback-hidden { display: none !important; }

    .lives {
      position: absolute;
      left: 16px;
      top: 69px;
      display: flex;
      gap: 4px;
      pointer-events: none;
    }

    .life {
      width: 24px;
      height: 24px;
      image-rendering: pixelated;
      filter: drop-shadow(0 2px 0 rgba(0, 0, 0, 0.45));
    }

    .life.is-empty { opacity: 0.18; filter: grayscale(1) brightness(0.7); }

    .recipe-layer { position: absolute; inset: 0; z-index: 63; pointer-events: none; }

    .target-hint { opacity: 0.46; }

    .scene-hit {
      position: absolute;
      margin: 0;
      padding: 0;
      border: 0;
      background: transparent;
      cursor: pointer;
      z-index: 90;
    }

    .sprite.is-selected {
      transform: translateY(-2px) scale(1.04);
      filter: drop-shadow(0 6px 10px rgba(0, 0, 0, 0.45));
    }

    .intro-overlay {
      position: absolute;
      inset: 0;
      z-index: 220;
      opacity: 1;
      transition: opacity 380ms ease, transform 380ms ease;
      background: #000;
    }

    .intro-overlay.fade-out { opacity: 0; transform: scale(1.02); }

    .intro-arrow {
      position: absolute;
      left: 495px;
      top: 388px;
      image-rendering: pixelated;
      cursor: pointer;
      pointer-events: auto;
      transition: transform 120ms ease;
    }

    .intro-arrow:hover { transform: scale(1.03); }

    .pause-layer,
    .confirm-layer { position: absolute; inset: 0; z-index: 210; }

    .pause-bg,
    .pause-highlight,
    .confirm-bg,
    .confirm-highlight { pointer-events: none; }

    .pause-hit,
    .confirm-hit {
      position: absolute;
      margin: 0;
      padding: 0;
      border: 0;
      background: transparent;
      cursor: pointer;
    }

    .pause-hit:focus-visible,
    .confirm-hit:focus-visible,
    .result-action:focus-visible { outline: 1px solid rgba(255, 255, 255, 0.8); outline-offset: 1px; }

    .result-overlay {
      position: absolute;
      inset: 0;
      z-index: 230;
      display: grid;
      place-items: center;
      background: rgba(0, 0, 0, 0.72);
      backdrop-filter: blur(4px);
    }

    .result-panel {
      width: min(88%, 360px);
      padding: 18px 18px 16px;
      border: 1px solid rgba(184, 210, 238, 0.42);
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(12, 23, 37, 0.96), rgba(5, 10, 17, 0.96));
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.54);
      text-align: center;
    }

    .result-title { margin: 0 0 8px; color: #f4f9ff; font-size: 20px; letter-spacing: 0.8px; text-shadow: var(--pixel-shadow); }
    .result-body { margin: 0 0 16px; color: #cad7e7; font-family: var(--hud-text-font); font-size: 13px; line-height: 1.45; }
    .result-actions { display: flex; justify-content: center; gap: 10px; }

    .result-action {
      min-width: 112px;
      padding: 8px 14px 9px;
      border: 1px solid rgba(173, 198, 227, 0.4);
      border-radius: 999px;
      background: rgba(19, 33, 52, 0.95);
      color: #f3f8ff;
      font-family: var(--hud-text-font);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      cursor: pointer;
      transition: transform 120ms ease, background 120ms ease;
    }

    .result-action:hover { transform: translateY(-1px); background: rgba(31, 52, 78, 0.98); }

    .cursor {
      width: 40px;
      height: 40px;
      transform: translate(-4px, -4px);
      pointer-events: none;
      z-index: 260;
      display: none;
    }
  </style>
</head>
