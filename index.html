<!doctype html>
<html lang="ru">
<head>
<link rel="icon" href="/icon.ico?v=2" type="image/x-icon">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spider-Man Menu Prototype</title>
  <style>
    @font-face {
      font-family: "Homoarakhn";
      src: url("./assets/fonts/homoarakhn.regular.ttf") format("truetype");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --bg: #0a0d12;
      --text: #e6edf7;
      --muted: #9fb0c8;
      --hud-number-font: "Small Fonts", "MS Sans Serif", Tahoma, "Arial Black", sans-serif;
      --hud-text-font: Tahoma, Arial, "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: radial-gradient(circle at top, #182133, var(--bg));
      color: var(--text);
      display: grid;
      place-items: center;
      gap: 10px;
      padding: 12px;
      box-sizing: border-box;
    }

    .wrap {
      width: min(100%, 980px);
      display: grid;
      gap: 10px;
    }

    .game {
      position: relative;
      width: min(100%, 960px);
      aspect-ratio: 4 / 3;
      border: 2px solid #2b3d5d;
      border-radius: 12px;
      overflow: hidden;
      background: #000;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.4);
      cursor: none;
    }

    #menu {
      position: absolute;
      inset: 0;
      transform-origin: top left;
    }

    .bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
      object-fit: fill;
      user-select: none;
      pointer-events: none;
    }

    .overlay {
      position: absolute;
      display: none;
      image-rendering: pixelated;
      pointer-events: none;
      user-select: none;
    }

    .menu-intro {
      position: absolute;
      inset: 0;
      z-index: 160;
      display: none;
      background: #000;
    }

    .menu-intro.is-visible {
      display: block;
    }

    .menu-intro-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: fill;
      background: #000;
      image-rendering: auto;
    }

    .menu-intro-prompt {
      position: absolute;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      padding: 7px 14px;
      border: 1px solid rgba(173, 198, 227, 0.42);
      border-radius: 999px;
      background: rgba(9, 14, 21, 0.8);
      color: #edf5ff;
      font-family: var(--hud-text-font);
      font-size: 13px;
      letter-spacing: 0.6px;
      text-align: center;
      opacity: 0;
      transition: opacity 160ms ease;
      pointer-events: none;
      white-space: nowrap;
    }

    .menu-intro.needs-gesture .menu-intro-prompt,
    .menu-intro.is-skippable .menu-intro-prompt {
      opacity: 1;
    }

    .hit {
      position: absolute;
      background: rgba(255, 255, 255, 0);
    }

    .help-layer {
      position: absolute;
      inset: 0;
      display: none;
      z-index: 140;
      background: #000;
    }

    .help-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: fill;
      image-rendering: pixelated;
      user-select: none;
      -webkit-user-drag: none;
    }

    .help-play {
      position: absolute;
      left: 495px;
      top: 388px;
      image-rendering: pixelated;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: auto;
      cursor: pointer;
      transition: transform 120ms ease;
    }

    .help-play:hover {
      transform: scale(1.03);
    }

    .mode-transition {
      position: absolute;
      inset: 0;
      z-index: 120;
      display: none;
      pointer-events: none;
      overflow: hidden;
    }

    .mode-transition.is-active {
      display: block;
    }

    .mode-transition-rect {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 50%;
      background: #000;
      will-change: transform;
      transition: transform 2000ms cubic-bezier(0.22, 0.61, 0.36, 1);
    }

    .mode-transition-rect.left {
      left: 0;
      transform: translateX(-100%);
    }

    .mode-transition-rect.right {
      right: 0;
      transform: translateX(100%);
    }

    .mode-transition.is-active .mode-transition-rect {
      transform: translateX(0);
    }

    .score-title {
      position: absolute;
      left: 0;
      right: 0;
      top: 10px;
      z-index: 20;
      text-align: center;
      color: #fbfdff;
      font-family: var(--hud-text-font);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.4px;
      line-height: 1;
      text-shadow:
        -2px 0 #000,
        2px 0 #000,
        0 -2px #000,
        0 2px #000,
        2px 2px 0 rgba(0, 0, 0, 0.35);
      transform: scaleX(1.08);
      transform-origin: center top;
      pointer-events: none;
      text-transform: uppercase;
      -webkit-font-smoothing: none;
      text-rendering: optimizeSpeed;
    }

    .score-title-art {
      position: absolute;
      left: 50%;
      top: 11px;
      z-index: 20;
      transform: translateX(-50%);
      image-rendering: pixelated;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }

    .score-value {
      position: absolute;
      left: 0;
      right: 0;
      top: 28px;
      z-index: 20;
      text-align: center;
      color: #fbfdff;
      font-family: var(--hud-number-font);
      font-size: 19px;
      font-weight: 700;
      letter-spacing: 1.3px;
      line-height: 1;
      text-shadow:
        -2px 0 #000,
        2px 0 #000,
        0 -2px #000,
        0 2px #000,
        2px 2px 0 rgba(0, 0, 0, 0.35);
      transform: scaleX(1.16);
      transform-origin: center top;
      pointer-events: none;
      -webkit-font-smoothing: none;
      text-rendering: optimizeSpeed;
    }

    .bitmap-score {
      position: absolute;
      display: flex;
      align-items: flex-start;
      gap: 0;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    .bitmap-score-digit {
      display: block;
      flex: none;
      image-rendering: pixelated;
      user-select: none;
      -webkit-user-drag: none;
    }

    .bitmap-score-fallback-hidden {
      display: none !important;
    }

    .score-value-bitmap {
      left: 0;
      right: 0;
      top: 29px;
      z-index: 20;
      min-height: 17px;
      justify-content: center;
    }

    .game-cursor {
      position: absolute;
      width: 40px;
      height: 40px;
      transform: translate(-4px, -4px);
      image-rendering: pixelated;
      pointer-events: none;
      z-index: 100;
      display: none;
    }

    .debug-intro-btn {
      position: absolute;
      right: 6px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 110;
      width: 28px;
      padding: 7px 4px;
      border: 1px solid rgba(173, 198, 227, 0.42);
      border-right: 0;
      border-radius: 8px 0 0 8px;
      background: rgba(8, 13, 19, 0.8);
      color: #e6edf7;
      font-family: var(--hud-text-font);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      writing-mode: vertical-rl;
      text-orientation: mixed;
      cursor: pointer;
      opacity: 0.72;
      transition: opacity 140ms ease, background 140ms ease;
    }

    .debug-intro-btn:hover {
      opacity: 1;
      background: rgba(15, 24, 35, 0.9);
    }

    .debug-intro-btn:disabled {
      opacity: 0.42;
      cursor: default;
    }

    .outside-controls {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .outside-exit {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .outside-icon-btn {
      width: 48px;
      height: 48px;
      padding: 0;
      border: 1px solid #3a4f71;
      border-radius: 10px;
      background: linear-gradient(180deg, #1f304a 0%, #111b2b 100%);
      display: grid;
      place-items: center;
      cursor: pointer;
      transition: transform 120ms ease, filter 120ms ease, border-color 120ms ease;
    }

    .outside-icon-btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.06);
      border-color: #6286bb;
    }

    .outside-icon-btn:active {
      transform: translateY(0);
    }

    .outside-icon {
      width: 40px;
      height: 40px;
      image-rendering: pixelated;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    .outside-btn {
      min-width: 164px;
      padding: 9px 14px;
      border: 1px solid #3a4f71;
      border-radius: 10px;
      background: linear-gradient(180deg, #1f304a 0%, #111b2b 100%);
      color: #e8f1ff;
      font-family: "Homoarakhn", "Segoe UI", sans-serif;
      font-size: 13px;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: transform 120ms ease, filter 120ms ease, border-color 120ms ease;
    }

    .outside-btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.06);
      border-color: #6286bb;
    }

    .outside-btn.is-muted {
      border-color: #5b6373;
      background: linear-gradient(180deg, #2d3138 0%, #191c22 100%);
      color: #c6cfdf;
    }

    .outside-btn:active {
      transform: translateY(0);
    }

    .log {
      color: var(--muted);
      font-size: 13px;
      background: rgba(14, 20, 30, 0.8);
      border: 1px solid #29364a;
      border-radius: 8px;
      padding: 8px 10px;
      min-height: 20px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="game" id="gameHost">
      <div id="menu"></div>
      <div id="menuIntroLayer" class="menu-intro" aria-live="polite">
        <video
          id="menuIntroVideo"
          class="menu-intro-video"
          preload="auto"
          playsinline
          src="./assets/video/menu/mmintro.webm"
        ></video>
        <div id="menuIntroPrompt" class="menu-intro-prompt">Click to start intro</div>
      </div>
      <img id="gameCursor" class="game-cursor" src="./assets/art/global/cursor/arrow2_trim.png" alt="cursor" />
    </div>

    <div class="outside-controls" aria-label="Menu controls">
      <button id="musicToggleBtn" class="outside-btn" type="button" aria-pressed="false">Music: on</button>
      <button id="debugReplayIntroBtn" class="outside-btn" type="button" title="Replay intros">Intro</button>
    </div>

    <div id="log" class="log">&#1047;&#1072;&#1075;&#1088;&#1091;&#1078;&#1072;&#1102; menu.txt...</div>
  </div>

  <audio id="hoverSfx" preload="auto" src="./assets/sounds/moclick001.wav"></audio>
  <audio id="clickSfx" preload="auto" src="./assets/sounds/click001.wav"></audio>
  <audio id="music" preload="auto" loop src="./assets/sounds/menu/mmloop001.wav"></audio>

  <script type="module" src="./src/main.js?v=20260310-1"></script>
</body>
</html>
