<!doctype html>
<html lang="ru">
<head>
  <link rel="icon" href="./icon.ico?v=3" type="image/x-icon">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Человек-Паук. Новая страница</title>
  <style>
    @font-face {
      font-family: "Homoarakhn";
      src: url("./assets/fonts/homoarakhn.regular.ttf") format("truetype");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --hud-number-font: "Small Fonts", "MS Sans Serif", Tahoma, "Arial Black", sans-serif;
      --hud-text-font: Tahoma, Arial, "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 12px;
      box-sizing: border-box;
      background:
        radial-gradient(circle at 50% 0%, rgba(33, 56, 98, 0.95), rgba(33, 56, 98, 0) 42%),
        linear-gradient(180deg, #0b1220 0%, #070b12 58%, #02050a 100%);
      font-family: "Homoarakhn", "Segoe UI", sans-serif;
    }

    .game-wrap {
      width: min(calc(100vw - 24px), 980px);
      aspect-ratio: 4 / 3;
      border: 2px solid #344766;
      border-radius: 10px;
      overflow: hidden;
      position: relative;
      background: #000;
      cursor: none;
      box-shadow:
        0 0 0 1px rgba(177, 199, 232, 0.12),
        0 18px 46px rgba(0, 0, 0, 0.55);
    }

    #root {
      position: absolute;
      inset: 0;
      transform-origin: top left;
      width: 640px;
      height: 480px;
    }

    .layer {
      position: absolute;
      image-rendering: pixelated;
      user-select: none;
      -webkit-user-drag: none;
    }

    .hidden {
      display: none;
    }

    .hud-label {
      position: absolute;
      z-index: 100;
      color: #fbfdff;
      font-family: var(--hud-text-font);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.2px;
      line-height: 1;
      text-shadow:
        -2px 0 #000,
        2px 0 #000,
        0 -2px #000,
        0 2px #000,
        2px 2px 0 rgba(0, 0, 0, 0.35);
      pointer-events: none;
      text-transform: uppercase;
      -webkit-font-smoothing: none;
      text-rendering: optimizeSpeed;
    }

    #scoreLabel {
      top: 9px;
      left: 50%;
      min-width: 110px;
      text-align: center;
      transform: translateX(-50%) scaleX(1.06);
      transform-origin: center top;
    }

    #scoreLabelArt {
      position: absolute;
      top: 11px;
      left: 50%;
      z-index: 100;
      transform: translateX(-50%);
      image-rendering: pixelated;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }

    #scoreValue,
    #currentScoreValue {
      font-family: var(--hud-number-font);
      top: 28px;
      font-size: 18px;
      min-height: 17px;
      letter-spacing: 1.3px;
    }

    #scoreValue {
      left: 50%;
      min-width: 92px;
      text-align: center;
      transform: translateX(-50%) scaleX(1.14);
      transform-origin: center top;
    }

    #currentScoreValue {
      right: 16px;
      min-width: 42px;
      text-align: right;
      transform: scaleX(1.14);
      transform-origin: right top;
    }

    .bitmap-score {
      position: absolute;
      z-index: 100;
      display: flex;
      align-items: flex-start;
      gap: 0;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    .bitmap-score-digit {
      display: block;
      flex: none;
      image-rendering: pixelated;
      user-select: none;
      -webkit-user-drag: none;
    }

    .bitmap-score-fallback-hidden {
      display: none !important;
    }

    #scoreValueBitmap,
    #currentScoreBitmap {
      top: 28px;
      min-height: 17px;
    }

    #scoreValueBitmap {
      left: 50%;
      min-width: 92px;
      justify-content: center;
      transform: translateX(-50%);
    }

    #currentScoreBitmap {
      right: 16px;
      min-width: 42px;
      justify-content: flex-end;
    }

    .life {
      position: absolute;
      width: 36px;
      height: 36px;
      image-rendering: pixelated;
      z-index: 100;
      pointer-events: none;
    }

    .cursor {
      position: absolute;
      width: 40px;
      height: 40px;
      transform: translate(-4px, -4px);
      image-rendering: pixelated;
      pointer-events: none;
      z-index: 260;
      display: none;
    }

    .center-text {
      position: absolute;
      left: 0;
      right: 0;
      top: 96px;
      text-align: center;
      color: #fbfdff;
      font-family: var(--hud-text-font);
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 1.8px;
      line-height: 1;
      text-shadow:
        -2px 0 #000,
        2px 0 #000,
        0 -2px #000,
        0 2px #000,
        2px 2px 0 rgba(0, 0, 0, 0.35);
      z-index: 170;
      pointer-events: none;
      text-transform: uppercase;
      -webkit-font-smoothing: none;
      text-rendering: optimizeSpeed;
    }

    .intro-overlay {
      position: absolute;
      inset: 0;
      z-index: 220;
      opacity: 1;
      transition: opacity 380ms ease, transform 380ms ease;
      background: #000;
    }

    .intro-overlay.hidden {
      display: none;
    }

    .intro-overlay.fade-out {
      opacity: 0;
      transform: scale(1.02);
    }

    .intro-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: fill;
      image-rendering: pixelated;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }

    .intro-arrow {
      position: absolute;
      left: 495px;
      top: 388px;
      cursor: pointer;
      pointer-events: auto;
      image-rendering: pixelated;
      user-select: none;
      -webkit-user-drag: none;
      transition: transform 120ms ease;
    }

    .intro-arrow:hover {
      transform: scale(1.03);
    }

    .pause-layer,
    .confirm-layer {
      position: absolute;
      inset: 0;
      z-index: 210;
    }

    .pause-bg,
    .pause-highlight,
    .confirm-bg,
    .confirm-highlight {
      position: absolute;
      image-rendering: pixelated;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }

    .pause-hit,
    .confirm-hit {
      position: absolute;
      margin: 0;
      padding: 0;
      border: 0;
      background: transparent;
      cursor: pointer;
    }

    .pause-hit:focus-visible,
    .confirm-hit:focus-visible {
      outline: 1px solid rgba(255, 255, 255, 0.8);
      outline-offset: 1px;
    }
  </style>
</head>
<body>
  <div class="game-wrap" id="gameWrap">
    <div id="root">
      <div id="introOverlay" class="intro-overlay hidden" aria-live="polite">
        <img class="intro-image" src="./assets/art/ui/help/help5MugShot.bmp" alt="&#1054;&#1087;&#1086;&#1079;&#1085;&#1072;&#1085;&#1080;&#1077;" />
        <img id="introContinue" class="intro-arrow" src="./assets/art/ui/help/playover.bmp" alt="&#1055;&#1088;&#1086;&#1076;&#1086;&#1083;&#1078;&#1080;&#1090;&#1100;" />
      </div>

      <div id="pauseMenuOverlay" class="pause-layer hidden" aria-live="polite">
        <img class="pause-bg" src="./assets/art/ui/menu.bmp" alt="&#1052;&#1077;&#1085;&#1102; &#1087;&#1072;&#1091;&#1079;&#1099;" style="left: 188px; top: 70px;" />

        <img
          id="pauseResumeOverlay"
          class="pause-highlight hidden"
          src="./assets/art/ui/resumeover.bmp"
          alt=""
          style="left: 213px; top: 111px;"
        />
        <button
          id="pauseResumeHit"
          class="pause-hit"
          type="button"
          aria-label="&#1055;&#1088;&#1086;&#1076;&#1086;&#1083;&#1078;&#1080;&#1090;&#1100;"
          style="left: 213px; top: 111px; width: 210px; height: 59px;"
        ></button>

        <img
          id="pauseRestartOverlay"
          class="pause-highlight hidden"
          src="./assets/art/ui/restartover.bmp"
          alt=""
          style="left: 200px; top: 173px;"
        />
        <button
          id="pauseRestartHit"
          class="pause-hit"
          type="button"
          aria-label="&#1047;&#1072;&#1085;&#1086;&#1074;&#1086;"
          style="left: 200px; top: 173px; width: 239px; height: 61px;"
        ></button>

        <img
          id="pauseHelpOverlay"
          class="pause-highlight hidden"
          src="./assets/art/ui/helpover.bmp"
          alt=""
          style="left: 232px; top: 237px;"
        />
        <button
          id="pauseHelpHit"
          class="pause-hit"
          type="button"
          aria-label="&#1055;&#1086;&#1084;&#1086;&#1097;&#1100;"
          style="left: 232px; top: 237px; width: 159px; height: 61px;"
        ></button>

        <img
          id="pauseMainMenuOverlay"
          class="pause-highlight hidden"
          src="./assets/art/ui/mainover.bmp"
          alt=""
          style="left: 195px; top: 301px;"
        />
        <button
          id="pauseMainMenuHit"
          class="pause-hit"
          type="button"
          aria-label="&#1043;&#1083;&#1072;&#1074;&#1085;&#1086;&#1077; &#1084;&#1077;&#1085;&#1102;"
          style="left: 195px; top: 301px; width: 249px; height: 60px;"
        ></button>
      </div>

      <div id="pauseConfirmOverlay" class="confirm-layer hidden" aria-live="polite">
        <img class="confirm-bg" src="./assets/art/global/areyousure.png" alt="&#1042;&#1099; &#1091;&#1074;&#1077;&#1088;&#1077;&#1085;&#1099;?" style="left: 181px; top: 170px;" />

        <img
          id="pauseConfirmYesOverlay"
          class="confirm-highlight hidden"
          src="./assets/art/global/yesover.bmp"
          alt=""
          style="left: 240px; top: 244px;"
        />
        <button
          id="pauseConfirmYesHit"
          class="confirm-hit"
          type="button"
          aria-label="&#1044;&#1072;"
          style="left: 240px; top: 244px; width: 83px; height: 35px;"
        ></button>

        <img
          id="pauseConfirmNoOverlay"
          class="confirm-highlight hidden"
          src="./assets/art/global/noover.bmp"
          alt=""
          style="left: 322px; top: 243px;"
        />
        <button
          id="pauseConfirmNoHit"
          class="confirm-hit"
          type="button"
          aria-label="&#1053;&#1077;&#1090;"
          style="left: 322px; top: 243px; width: 58px; height: 35px;"
        ></button>
      </div>
    </div>
    <img id="cursor" class="cursor" src="./assets/art/global/cursor/arrow2_trim.png" alt="cursor" />
  </div>

  <script type="module" src="./src/mugshot.js"></script>
</body>
</html>
